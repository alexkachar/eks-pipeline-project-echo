name: Build and Deploy

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "k8s/**"
      - ".github/workflows/deploy.yml"

jobs:
  build-and-deploy:
    # Must match the ARC runner scale set name in Terraform
    runs-on: eks-pipeline-project-echo

    env:
      ECR_REGISTRY: 038526103886.dkr.ecr.eu-central-1.amazonaws.com
      AWS_REGION: eu-central-1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Build images with Kaniko ─────────────────────────────────────────────
      # Kaniko uses the IRSA credentials injected into the runner pod
      # (AWS_ROLE_ARN + AWS_WEB_IDENTITY_TOKEN_FILE) to authenticate to ECR.
      # No explicit docker login step is needed.

      - name: Build and push frontend image
        run: |
          executor \
            --context=dir://${{ github.workspace }}/app/frontend \
            --dockerfile=${{ github.workspace }}/app/frontend/Dockerfile \
            --destination=$ECR_REGISTRY/todo-app-frontend:${{ github.sha }} \
            --destination=$ECR_REGISTRY/todo-app-frontend:latest \
            --snapshot-mode=redo \
            --cache=true \
            --cache-repo=$ECR_REGISTRY/todo-app-frontend/cache

      - name: Build and push backend image
        run: |
          executor \
            --context=dir://${{ github.workspace }}/app/backend \
            --dockerfile=${{ github.workspace }}/app/backend/Dockerfile \
            --destination=$ECR_REGISTRY/todo-app-backend:${{ github.sha }} \
            --destination=$ECR_REGISTRY/todo-app-backend:latest \
            --snapshot-mode=redo \
            --cache=true \
            --cache-repo=$ECR_REGISTRY/todo-app-backend/cache

      # ── Deploy ───────────────────────────────────────────────────────────────
      # helm and kubectl use in-cluster config automatically (via the runner
      # pod's service account). RBAC granting deploy rights is in the Helm chart.

      - name: Deploy with Helm
        run: |
          helm upgrade todo-app ./k8s/helm/todo-app \
            --namespace todo-app \
            --set backend.image.tag=${{ github.sha }} \
            --set frontend.image.tag=${{ github.sha }} \
            --wait \
            --timeout 5m

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/todo-app-frontend -n todo-app --timeout=120s
          kubectl rollout status deployment/todo-app-backend  -n todo-app --timeout=120s
